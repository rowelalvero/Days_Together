name: days_together
description: "A beautiful love story timeline app"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.2
  shared_preferences: ^2.2.2
  path_provider: ^2.1.0
  path: ^1.8.3
  audioplayers: ^6.5.1
  animations: ^2.0.7
  lottie: ^2.7.0
  shimmer: ^3.0.0
  provider: ^6.1.1
  uuid: ^4.2.0
  intl: ^0.19.0
  fl_chart: ^0.70.2
  sensors_plus: ^6.1.1
  share_plus: ^10.1.4
  confetti: ^0.8.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0
  qr_flutter: ^4.1.0
  gal: ^2.3.2
  supabase_flutter: ^2.6.0
  google_sign_in: ^6.2.1
  flutter_dotenv: ^5.1.0
  permission_handler: ^11.3.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/animations/
    - assets/music/
    - assets/themes/
    - assets/images/placeholder.jpg
  fonts:
    - family: Cormorant
      fonts:
        - asset: assets/fonts/CormorantGaramond-Regular.ttf
    - family: Spectral
      fonts:
        - asset: assets/fonts/Spectral-Regular.ttf
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
